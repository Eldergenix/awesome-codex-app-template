name: Bug Report
description: File a bug report for something not working as expected
title: "[bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Fill this out as completely as possible.

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: "macOS 15.4 / Ubuntu 24.04 / Windows 11"
    validations:
      required: true

  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: "22.x"
    validations:
      required: true

  - type: dropdown
    id: app
    attributes:
      label: Affected app or package
      multiple: true
      options:
        - apps/web
        - apps/mobile
        - apps/macos
        - apps/api
        - apps/mcp
        - packages/ai
        - packages/supabase
        - packages/theme
        - Agent / skills / AGENTS.md
        - Setup wizard (/setup)
        - CI / GitHub Actions
        - Other
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: Step-by-step instructions to reproduce the bug
      placeholder: |
        1. Run `pnpm install`
        2. Run `pnpm --filter @repo/web dev`
        3. Navigate to /setup
        4. ...
    validations:
      required: true

  - type: textarea
    id: error
    attributes:
      label: Error output
      description: Paste the raw terminal output — not a description of it
      render: shell
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
